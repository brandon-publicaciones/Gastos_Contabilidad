<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>💰 Mis Gastos</title>
</head>
<body>
    <div id="app">
        <header>
            <h1>💰 Mis Gastos</h1>
            <p class="fecha" id="fecha-actual"></p>
        </header>

        <!-- PRESUPUESTOS -->
        <section class="presupuestos-section" id="presupuestos-container">
            <!-- Se carga dinámicamente -->
        </section>

        <!-- FORMULARIO -->
        <section class="form-section">
            <h2>➕ Registrar gasto</h2>
            <form id="form-gasto">
                <input type="text" id="descripcion" placeholder="¿Qué compraste?" required>
                <input type="number" id="monto" placeholder="Monto" step="0.01" min="0.01" required>
                <select id="categoria">
                    <option value="Comida">🍔 Comida ($10/día)</option>
                    <option value="Pasaje">🚌 Pasaje ($3/día)</option>
                    <option value="Supermercado">🛒 Supermercado ($80/sem)</option>
                    <option value="Ocio">🎮 Ocio</option>
                    <option value="Salud">💊 Salud</option>
                    <option value="Hogar">🏠 Hogar</option>
                    <option value="General">📦 General</option>
                </select>
                <button type="submit" class="btn-primary">Registrar</button>
            </form>
        </section>

        <!-- HISTORIAL -->
        <section class="historial">
            <h2>📋 Gastos de hoy</h2>
            <ul id="lista-gastos"></ul>
        </section>

        <button class="btn-sync" onclick="sincronizar()">☁️ Sincronizar Sheets</button>
    </div>

    <!-- MODAL ALERTA LÍMITE -->
    <div id="modal-alerta" class="modal">
        <div class="modal-content alerta">
            <h2>🚫 ¡LÍMITE EXCEDIDO!</h2>
            <p id="modal-mensaje"></p>
            <div id="modal-detalles"></div>
            <button onclick="cerrarModal()" class="btn-primary">Entendido</button>
        </div>
    </div>

    <!-- MODAL ÉXITO -->
    <div id="modal-exito" class="modal">
        <div class="modal-content exito">
            <h2>✅ Gasto registrado</h2>
            <p id="exito-mensaje"></p>
            <div id="exito-detalles"></div>
            <button onclick="cerrarExito()" class="btn-primary">Aceptar</button>
        </div>
    </div>

    <!-- MODAL EDITAR PRESUPUESTOS -->
    <div id="modal-presupuestos" class="modal">
        <div class="modal-content">
            <h2>⚙️ Editar presupuestos</h2>
            <div id="presupuestos-edit"></div>
            <div class="modal-buttons">
                <button onclick="cerrarPresupuestos()" class="btn-secundario">Cancelar</button>
                <button onclick="guardarPresupuestos()" class="btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
